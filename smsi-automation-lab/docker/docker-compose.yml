services:
  db:
    image: postgres:15-alpine
    container_name: ciso_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-ciso}
      POSTGRES_USER: ${DB_USER:-ciso}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ciso} -d ${DB_NAME:-ciso}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/intuitem/ciso-assistant-community/backend:latest
    container_name: ciso_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_DEBUG: "False"
      DB_NAME: ${DB_NAME:-ciso}
      DB_USER: ${DB_USER:-ciso}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      CISO_SUPERUSER_EMAIL: ${SUPERUSER_EMAIL}
      CISO_SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - backend_data:/code/db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/iam/login/ | grep -qE '(200|405|401|403)'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend:
    image: ghcr.io/intuitem/ciso-assistant-community/frontend:latest
    container_name: ciso_frontend
    restart: unless-stopped
    environment:
      PUBLIC_BACKEND_API_URL: http://backend:8000/api
      ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local
